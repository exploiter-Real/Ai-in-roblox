<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq Roblox High-FPS Companion</title>
    <style>
        body { font-family: sans-serif; background: #0f0f12; color: #fff; text-align: center; padding: 15px; margin: 0; }
        .wrapper { max-width: 450px; margin: 15px auto; background: #1a1a24; padding: 20px; border-radius: 16px; border: 1px solid #2d2d3d; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        input[type="text"] { margin: 10px 0; background: #252538; padding: 12px; width: 100%; border-radius: 8px; border: none; color: white; box-sizing: border-box; }
        .key-section { background: #222230; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #3b82f6; }
        button { background: #3b82f6; color: white; border: none; padding: 14px; font-size: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        button:hover { background: #2563eb; }
        .btn-live { background: #10b981; }
        .btn-live:hover { background: #059669; }
        .btn-stop { background: #ef4444; }
        .btn-stop:hover { background: #dc2626; }
        #responseBox { margin-top: 15px; padding: 15px; background: #222230; border-left: 4px solid #3b82f6; border-radius: 6px; text-align: left; word-wrap: break-word; font-size: 14px; line-height: 1.4; min-height: 50px; }
        #videoHide { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>Groq Ultra-Light Vision Hub</h2>
    <p style="color: #a0a0b0; font-size: 13px; margin-top: -5px;">FPS-Optimized Real-Time Screen Analysis</p>
    
    <div id="keySection" class="key-section">
        <label for="apiKeyInput" style="font-size: 13px; display:block; text-align:left; margin-bottom:5px; color:#3b82f6;">Enter Groq API Key:</label>
        <input type="text" id="apiKeyInput" placeholder="gsk_...">
        <button onclick="saveApiKey()">Save Key to Memory</button>
    </div>
    
    <div id="activeSection" style="display: none;">
        <p style="color: #10b981; font-size: 13px; font-weight: bold; margin: 5px 0;">✅ Groq API Key Loaded</p>
        <button id="streamBtn" class="btn-live" onclick="toggleStream()">Start Tracking (FPS Boost Enabled)</button>
    </div>
    
    <div id="responseBox">Awaiting configuration or stream startup...</div>
</div>

<video id="videoHide" autoplay playsinline></video>

<script>
    const keySection = document.getElementById('keySection');
    const activeSection = document.getElementById('activeSection');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const streamBtn = document.getElementById('streamBtn');
    const responseBox = document.getElementById('responseBox');
    const video = document.getElementById('videoHide');

    let streamInstance = null;
    let autoLoopInterval = null;
    let offscreenCanvas = null;
    let offscreenCtx = null;

    window.onload = function() {
        if (localStorage.getItem('groq_api_key')) {
            showActiveInterface();
        }
    };

    function saveApiKey() {
        const key = apiKeyInput.value.trim();
        if (!key) { alert("Please enter a valid key!"); return; }
        localStorage.setItem('groq_api_key', key);
        showActiveInterface();
        responseBox.innerText = "Key saved! Tap 'Start Tracking' to begin.";
    }

    function showActiveInterface() {
        keySection.style.display = 'none';
        activeSection.style.display = 'block';
    }

    async function toggleStream() {
        if (streamInstance) {
            stopStream();
            return;
        }

        responseBox.innerText = "Requesting system screen sharing permissions...";

        try {
            // OPTIMIZATION 1: Force Android to capture video at low resolution and frame rate
            streamInstance = await navigator.mediaDevices.getDisplayMedia({
                video: { 
                    width: { ideal: 480 }, 
                    height: { ideal: 360 },
                    frameRate: { ideal: 5 } 
                },
                audio: false
            });

            video.srcObject = streamInstance;
            
            // OPTIMIZATION 2: Decouple from DOM by creating a headless memory canvas
            if (typeof OffscreenCanvas !== 'undefined') {
                offscreenCanvas = new OffscreenCanvas(480, 360);
                offscreenCtx = offscreenCanvas.getContext('2d');
            } else {
                // Fallback for older browsers
                const fallbackCanvas = document.createElement('canvas');
                fallbackCanvas.width = 480;
                fallbackCanvas.height = 360;
                offscreenCtx = fallbackCanvas.getContext('2d', { willReadFrequently: true });
                offscreenCanvas = fallbackCanvas;
            }

            streamBtn.innerText = "Stop Tracking";
            streamBtn.className = "btn-stop";
            responseBox.innerText = "Connected! High-performance background loop active.";

            // Check screen every 8 seconds to prevent excessive network thread spam
            autoLoopInterval = setInterval(captureAndSendToGroq, 8000);
            streamInstance.getVideoTracks()[0].onended = () => stopStream();

        } catch (err) {
            responseBox.innerText = "Stream access denied or unsupported.";
            console.error(err);
            stopStream();
        }
    }

    function stopStream() {
        if (autoLoopInterval) clearInterval(autoLoopInterval);
        if (streamInstance) {
            streamInstance.getTracks().forEach(track => track.stop());
        }
        streamInstance = null;
        video.srcObject = null;
        offscreenCanvas = null;
        offscreenCtx = null;
        streamBtn.innerText = "Start Tracking (FPS Boost Enabled)";
        streamBtn.className = "btn-live";
        responseBox.innerText = "Stream stopped.";
    }

    async function captureAndSendToGroq() {
        const apiKey = localStorage.getItem('groq_api_key');
        if (!apiKey || !streamInstance || !offscreenCtx) return;

        // OPTIMIZATION 3: Draw directly into memory at a fixed, lightweight size
        offscreenCtx.drawImage(video, 0, 0, 480, 360);
        
        // OPTIMIZATION 4: Drop image quality to 40% (Plenty clear for AI, extremely fast to compress)
        let dataUrl;
        if (offscreenCanvas.convertToBlob) {
            const blob = await offscreenCanvas.convertToBlob({ type: 'image/jpeg', quality: 0.4 });
            dataUrl = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        } else {
            dataUrl = offscreenCanvas.toDataURL('image/jpeg', 0.4);
        }

        const base64Data = dataUrl.split(',')[1];

        try {
            const res = await fetch("https://groq.com", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "llama-3.2-11b-vision-preview",
                    messages: [
                        {
                            role: "user",
                            content: [
                                { type: "text", text: "You are looking at a live screen share feed of a user playing Roblox Build a Boat for Treasure. Give exactly 1 short sentence of tactical building layout tips or funny commentary based on what you see right now. You can even try and make fun of the users" },
                                { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64Data}` } }
                            ]
                        }
                    ],
                    max_tokens: 60
                })
            });
            
            const data = await res.json();
            if (data.choices && data.choices[0]) {
                responseBox.innerHTML = `<strong>Live Companion:</strong> ${data.choices[0].message.content}`;
            }
        } catch (err) {
            console.error("Auto frame transmission failed:", err);
        }
    }
</script>
</body>
</html>
